<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#FAF7F0" rx="24"/>
  <!-- Garlic -->
  <ellipse cx="120" cy="185" rx="45" ry="50" fill="#EFE6D6" stroke="#164E4A" stroke-width="2" opacity="0.8"/>
  <ellipse cx="120" cy="170" rx="28" ry="35" fill="#FAF7F0" stroke="#164E4A" stroke-width="1.5"/>
  <path d="M 105 152 Q 120 135 135 152" stroke="#164E4A" stroke-width="1.5" fill="none"/>
  <text x="120" y="262" font-family="sans-serif" font-size="12" fill="#164E4A" text-anchor="middle" font-weight="bold">'D+HE</text>
  <text x="120" y="280" font-family="sans-serif" font-size="10" fill="#647067" text-anchor="middle">Garlic</text>
  <!-- Apple cider vinegar bottle -->
  <rect x="265" y="140" width="70" height="100" fill="#D99A2B" opacity="0.3" rx="8"/>
  <rect x="275" y="125" width="50" height="25" fill="#D99A2B" opacity="0.5" rx="5"/>
  <text x="300" y="262" font-family="sans-serif" font-size="12" fill="#164E4A" text-anchor="middle" font-weight="bold">.D 'D*A'-</text>
  <text x="300" y="280" font-family="sans-serif" font-size="10" fill="#647067" text-anchor="middle">Apple Cider Vinegar</text>
  <!-- Jojoba leaf -->
  <ellipse cx="470" cy="180" rx="45" ry="25" fill="#0F766E" opacity="0.2" transform="rotate(-20 470 180)"/>
  <ellipse cx="470" cy="185" rx="35" ry="18" fill="#0F766E" opacity="0.3" transform="rotate(-20 470 185)"/>
  <line x1="435" y1="195" x2="505" y2="170" stroke="#0F766E" stroke-width="2" opacity="0.6"/>
  <text x="470" y="262" font-family="sans-serif" font-size="12" fill="#164E4A" text-anchor="middle" font-weight="bold">2J* ,H,H('</text>
  <text x="470" y="280" font-family="sans-serif" font-size="10" fill="#647067" text-anchor="middle">Jojoba Oil</text>
  <text x="300" y="355" font-family="sans-serif" font-size="14" font-weight="bold" fill="#164E4A" text-anchor="middle">ECHF'* 7(J9J) 100%</text>
